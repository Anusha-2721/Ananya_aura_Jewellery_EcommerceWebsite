<!DOCTYPE html>
<html>

<head>

<title>Customer Details</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{

width:400px;
margin:50px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px gray;

}

input,textarea,select,button{

width:100%;
padding:10px;
margin:10px 0;

}

button{

background:black;
color:white;
border:none;
border-radius:10px;

}

</style>

</head>


<body>


<div class="container">


<h1>Customer Details</h1>


<form onsubmit="placeOrder(event)">


<input 
type="text"
id="name"
placeholder="Enter name"
required>


<input 
type="email"
id="email"
placeholder="Enter email"
required>



<input 
type="number"
id="phone"
placeholder="Enter phone"
required>



<textarea
id="address"
placeholder="Enter address"
required></textarea>



<select id="payment">

<option>Cash on Delivery</option>

<option>UPI</option>

<option>Card</option>

</select>



<button type="submit">
Place Order
</button>



</form>


</div>
<script>
async function placeOrder(event) {
  event.preventDefault();

  let cartRes = await fetch("http://localhost:5000/api/cart/1");
  let cart = await cartRes.json();

  if (cart.length === 0) {
    alert("Cart Empty");
    return;
  }

  let total = 0;

  let productNames = [];

  cart.forEach(item => {
    total += item.price * (item.quantity || item.qty || 1);
    productNames.push(item.product_name || item.name);
  });

  let orderData = {
    user_id: 1,
    product_name: productNames.join(", "),
    price: cart[0].price,
    quantity: cart.length,
    total: total
  };

  let res = await fetch("http://localhost:5000/api/orders", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(orderData)
  });

  let data = await res.json();

  if (!res.ok) {
    alert(data.message || "Order Failed");
    return;
  }

  alert("Order Placed Successfully 🎉");

  // go to confirmation page
  window.location.href = "confirmation.html";
}


</script>
</body>

</html>
