<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}


.box{

width:350px;
margin:100px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px gray;

}


input,button{

width:100%;
padding:10px;
margin:10px;

}


button{

background:black;
color:white;
border:none;

}

</style>

</head>


<body>


<div class="box">


<h2>Admin Login</h2>


<input 
id="adminEmail"
placeholder="Admin Email">


<input 
id="adminPassword"
type="password"
placeholder="Password">



<button onclick="adminLogin()">
Login
</button>


</div>



<script>


function adminLogin(){


let email =
document.getElementById("adminEmail").value;


let password =
document.getElementById("adminPassword").value;



if(
email=="admin@gmail.com" &&
password=="admin123"
){


localStorage.setItem(
"admin",
"true"
);



alert("Admin Login Successful");


window.location.href="admin.html";


}

else{


alert("Invalid Admin Details");


}


}


</script>


</body>

</html>
